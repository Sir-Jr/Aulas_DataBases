services:
  neo4j:
    image: neo4j:5
    container_name: neo4j
    ports:
      - 7474:7474   # Interface web (Neo4j Browser)
      - 7687:7687   # Bolt (conexões via drivers)
    environment:
      - NEO4J_AUTH=neo4j/senha123
      - NEO4J_dbms_memory_heap_initial__size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512M
      - NEO4JLABS_PLUGINS=["apoc", "n10s"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p senha123 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  neo4j-init:
    image: neo4j:5
    container_name: neo4j_init
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./init-data.cypher:/init-data.cypher:ro
    command: >
      cypher-shell
      -a bolt://neo4j:7687
      -u neo4j
      -p senha123
      -f /init-data.cypher
    restart: "no"

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_plugins:
